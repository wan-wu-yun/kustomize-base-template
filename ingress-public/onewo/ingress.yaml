apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  annotations:
    kubernetes.io/ingress.class: "nginx"
  name: demo-app-public
spec:
  tls:
  - hosts:   
    - id.onewo.com
    secretName: onewo.com-tls
  rules:
    # eg  www.vankeservice.com
  - host: id.onewo.com
    http:
      paths:
      - path: /
        backend:
          serviceName: demo-app
          servicePort: http
