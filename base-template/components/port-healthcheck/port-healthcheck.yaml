- op: add
  path: /spec/template/spec/containers/0/livenessProbe
  value:
    tcpSocket:
      port: 8080
    initialDelaySeconds: 60
    failureThreshold: 3
    periodSeconds: 10
    timeoutSeconds: 3
    successThreshold: 1
- op: add
  path: /spec/template/spec/containers/0/readinessProbe
  value:
    initialDelaySeconds: 60
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 3
    failureThreshold: 3
    tcpSocket:
      port: 8080