apiVersion: apps/v1 
kind: StatefulSet
metadata:
  name:  demo-app
spec: 
  serviceName: demo-app
  replicas: 1 
  selector:
    matchLabels:
      app: demo-app
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate 
  revisionHistoryLimit: 10
  template:
    spec:
      restartPolicy: Always
      containers:
      - name:  demo-app
        image: harbor.vankeservice.com/demo/demo:latest
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: demo-app
      imagePullSecrets:
      - name: regcred
