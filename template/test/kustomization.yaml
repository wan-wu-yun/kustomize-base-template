#patchesStrategicMerge:  如果有其他定制的配置，可以在这里直接引用
patchesStrategicMerge:
- sls-map.yaml

# 指定命名空间
namespace: dev-bzzt
# 指定通用label
commonLabels:
  app: dev-bzzt   
resources:
  - https://git.vankeservice.com/k8s/public/kustomize-base-template.git/template/base/deployment?ref=jfrog
# ingress 配置，按需开启
  - https://git.vankeservice.com/k8s/public/kustomize-base-template.git/template/components/ingress/onewo
# 部署通用组件
components:
  - https://git.vankeservice.com/k8s/public/kustomize-base-template.git/template/components/healthcheck
#  - https://git.vankeservice.com/k8s/public/kustomize-base-template.git/template/components/sls-cm
patches:
  - patch: |
      - op: replace
        path: /metadata/name
        value: war-painting-dev   #替换部署名称，demoapp
    target:
      name: demo-app*
  # Pod相关配置
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/name
        value: war-painting     # 修改容器名
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 80    # 修改容器端口
      - op: replace
        path: /spec/replicas
        value: 2   # 修改副本数
      ###添加启动参数 如需要  取消注释      
      # - op: add
      #   path: /spec/template/spec/containers/0/args
      #   value: ['vk-wechat']      
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/tcpSocket/port
        value: 80  # 健康检查端口
      - op: replace
        path: /spec/template/spec/containers/0/readinessProbe/tcpSocket/port
        value: 80   # 健康检查端口
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            cpu: 500m     # 替换Cpu最大使用值
            memory: 500Mi # 替换Mem最大使用值
          requests:
            cpu: 300m     # 替换Cpu初始使用值
            memory: 256Mi # 替换Mem初始使用值  
    target:
      group: apps
      kind: Deployment
      version: v1

# #日志服务配置：(调试数据层级不对，下次开启)
#   - patch: |
#       - op: add
#       path：/data/
#       value:
#          aliyun_logs_sls-demo: stdout              # 替换sls-demo为对硬值
#          aliyun_logs_sls-demo_logstore: sls-demo   
#          aliyun_logs_sls-demo_project: sls-demo
#     target:
#       kind: ConfigMap
#       version: v1

#修改service相关参数 
  - patch: |
     - op: replace
       path: /spec/ports/0/port
       value: 80 ####svc端口
    target:
      kind: Service
      version: v1

# Ingress
  - patch: |
     - op: replace
       path: /spec/tls/0/hosts/0 
       value: vspaceloc.onewo.com             # 替换https域名
     - op: replace
       path: /spec/rules/0/host
       value: vspaceloc.onewo.com            # 替换http域名
     - op: replace
       path: /metadata/annotations/kubernetes.io~1ingress.class
       value: vspace                           # 替换ingress class
    ### 默认指向/目录 如需修改，取消以下注释 修改对应path即可
    #  - op: replace
    #  path: /spec/rules/0/http/paths/0
    #   value:
    #     path: '/task-console'              #  替换对应path
    #     backend:
    #       serviceName: prod-vk-wechat-admin
    #       servicePort: http
    target:
      kind: Ingress
      version: v1beta1
