- op: add
  path: /spec/template/spec/containers/0/livenessProbe
  value:
      initialDelaySeconds: 60
      periodSeconds: 10
      successThreshold: 1
      tcpSocket:
        port: 9101
      timeoutSeconds: 10
- op: add
  path: /spec/template/spec/containers/0/readinessProbe
  value:
      initialDelaySeconds: 60
      periodSeconds: 10
      successThreshold: 1
      tcpSocket:
        port: 9101
      timeoutSeconds: 10